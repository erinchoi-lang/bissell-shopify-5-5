<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bissell x Shopify</title>
  <script src="/client/quick.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f6f6f7;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 { font-size: 1.75rem; margin-bottom: 12px; }
    p { color: #6b7280; line-height: 1.6; }
    .badge {
      display: inline-block;
      background: #008060;
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Shopify</div>
    <h1>Bissell x Shopify</h1>
    <p>This site is hosted on Quick — Shopify's internal static hosting platform.</p>
  </div>
  <script>
    (async () => {
      const user = await quick.id.waitForUser();
      console.log("Logged in as:", user.email);
    })();
  </script>
</body>
</html>
